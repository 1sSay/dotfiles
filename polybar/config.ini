;; WM setitngs

[color]

background = #1F1F1F
foreground = #FFAAFF
foreground-alt = #8F8F8F

[bar/main]
padding-left = 6px
padding-right = 6px
bottom = false
fixed-center = true

width = 1896px
height = 36
offset-x = 12px
offset-y = 12px

background = ${color.background}
foreground = ${color.foreground}

underline-size = 2
underline-color = ${color.foreground}

padding = 0

module-margin-left = 3px
module-margin-right = 3px

font-0 = "Fantasque Sans:pixelsize=12;3"
font-1 = "Iosevka Nerd Font:pixelsize=14;4"

separator = 

modules-left = workspaces
modules-center = xwindow
modules-right = alsa battery network xkeyboard date

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = " ´ä£ %layout% "
label-layout-foreground = ${colors.foreground}

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/alsa]
type = internal/alsa

master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default

master-mixer = Master

interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.background}
format-volume-padding = 2

format-muted = <label-muted>
format-muted-prefix = ´¬Ç
format-muted-background = ${color.background}
format-muted-padding = 2

label-volume = %percentage%%

label-muted = " Muted"
